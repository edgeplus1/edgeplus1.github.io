<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>App Store Banner Preview</title>
<style>
  body {
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  .appstore-banner {
    position: relative;
    width: 100%;
    max-width: 90%;
    height: 800px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
  }

  /* Верхняя часть (70%) */
  .banner-top {
    flex: 6;
    background: var(--bg-image) center/cover no-repeat;
    position: relative;
  }

  .banner-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.1));
  }

  .badge {
    position: absolute;
    top: 20px;
    left: 20px;
    background: rgba(0,0,0,0.6);
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: bold;
    color: white;
    z-index: 2;
  }

  /* Нижняя часть (30%) */
  .banner-bottom {
    flex: 2;
    position: relative;
    padding: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: white;
    z-index: 1;
  }

  /* Фон и размытие на всю ширину */
  .banner-bottom::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(var(--bg-rgb), 0.9) 0%,
      rgba(var(--bg-rgb), 0.7) 100%
    );
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    z-index: -1;
  }

  .special-event {
    font-size: 14px;
    opacity: 0.8;
  }

  .title {
    font-size: 26px;
    font-weight: 700;
    margin: 8px 0;
  }

  .subtitle {
    font-size: 16px;
    opacity: 0.85;
    margin-bottom: 10px;
  }

  .app-info {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.15);
    padding: 10px;
    border-radius: 14px;
  }

  .app-icon {
    width: 50px;
    height: 50px;
    border-radius: 12px;
    margin-right: 10px;
  }

  .app-text {
    flex: 1;
  }

  .app-name {
    font-weight: bold;
  }

  .app-desc {
    font-size: 13px;
    opacity: 0.85;
  }

  .get-btn {
    background: white;
    color: black;
    border: none;
    padding: 6px 14px;
    border-radius: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s;
  }

  .get-btn:hover {
    background: #eaeaea;
  }
</style>
</head>
<body>

<div class="appstore-banner" style="--bg-image: url('https://quizizz.com/_media/quizzes/12a5acd6-0123-4ab2-8fe1-faaafce3f53e_900_900');">
  <div class="banner-top">
    <div class="banner-overlay"></div>
    <div class="badge">Сегодня: DD/MM</div>
  </div>

  <div class="banner-bottom">
    <div>
      <div class="special-event">Рандомный факт:</div>
      <h1 class="title">Добро пожаловать на сайт Edge+</h1>
      <p class="subtitle">Здесь вы найдете все, что вам нужно, и то что вам не нужно тоже!</p>
    </div>

    <div class="app-info">
    <!--<img src="https://i.imgur.com/SOfLe1M.png" alt="App Icon" class="app-icon">-->
      <div class="app-text">
        <div class="app-name">Rivixal Clock 2.3</div>
        <div class="app-desc">Проснись в своё время!</div>
      </div>
      <button class="get-btn">Перейти</button>
    </div>
  </div>
</div>

<script>
  function getAverageColor(imgElement) {
    const canvas = document.createElement('canvas');
    const context = canvas.getContext && canvas.getContext('2d');
    const width = canvas.width = imgElement.naturalWidth || imgElement.width;
    const height = canvas.height = imgElement.naturalHeight || imgElement.height;
    context.drawImage(imgElement, 0, 0);
    const data = context.getImageData(0, 0, width, height).data;
    let r = 0, g = 0, b = 0;
    const length = data.length / 4;
    for (let i = 0; i < data.length; i += 4) {
      r += data[i];
      g += data[i + 1];
      b += data[i + 2];
    }
    r = Math.floor(r / length);
    g = Math.floor(g / length);
    b = Math.floor(b / length);
    return { rgb: `${r},${g},${b}`, full: `rgb(${r},${g},${b})` };
  }

  const imgUrl = getComputedStyle(document.querySelector('.appstore-banner'))
    .getPropertyValue('--bg-image')
    .replace(/url\(['"]?(.*?)['"]?\)/, '$1');

  const img = new Image();
  img.crossOrigin = 'Anonymous';
  img.src = imgUrl;
  img.onload = function() {
    const avgColor = getAverageColor(img);
    const banner = document.querySelector('.appstore-banner');
    banner.style.setProperty('--bg-color', avgColor.full);
    banner.style.setProperty('--bg-rgb', avgColor.rgb);
  };
</script>

</body>
</html>
